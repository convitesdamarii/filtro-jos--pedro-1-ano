<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filtro José Pedro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste para nitidez visual no navegador */
        video {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    
    <img src="moldura.png" id="moldura">

    <div class="controles">
        <button id="btn-inverter"><img src="trocar.png"></button>
        <button id="btn-foto" class="btn-principal"><img src="camera.png"></button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
