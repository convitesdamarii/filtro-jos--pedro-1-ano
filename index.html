<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filtro Temático</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        
        <img src="moldura.png" id="moldura" alt="Moldura">

        <div class="controls">
            <button id="btn-switch"><img src="trocar.png" width="40"></button>
            <button id="btn-capture"><img src="camera.png" width="60"></button>
        </div>
        
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
